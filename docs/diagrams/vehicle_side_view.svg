<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 700" font-family="Arial, sans-serif">
  <rect x="0" y="0" width="950" height="700" fill="#ffffff"/>

  <text x="475" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a1a">ASV Vehicle — Side Profile View</text>
  <text x="475" y="56" text-anchor="middle" font-size="12" fill="#555555">Bow at left — heights referenced to waterline (WL = 0mm)</text>

  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
  </defs>

  <!-- Waterline reference: WL_y = 480 -->
  <line x1="60" y1="480" x2="900" y2="480" stroke="#2980b9" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="905" y="484" font-size="12" fill="#2980b9" font-weight="bold">WATERLINE (0mm)</text>

  <!-- Water fill below waterline -->
  <rect x="0" y="480" width="950" height="220" fill="#d6eaf8" opacity="0.5"/>

  <!-- Pontoon cross-section at waterline: centerline at WL, radius 63px (114.3mm dia) -->
  <ellipse cx="480" cy="480" rx="420" ry="63" fill="#d9d9d9" stroke="#666666" stroke-width="2"/>
  <text x="480" y="540" text-anchor="middle" font-size="11" fill="#444">Pontoon cross-section (4" Sch 40 PVC, ~50% submerged)</text>

  <!-- Deck / cross member level above pontoon top -->
  <line x1="150" y1="390" x2="810" y2="390" stroke="#999999" stroke-width="4"/>
  <text x="820" y="394" font-size="10" fill="#666">Deck (cross members)</text>

  <!-- Electronics enclosure above waterline -->
  <rect x="430" y="291" width="140" height="99" fill="#aed6f1" stroke="#1f6feb" stroke-width="2.5"/>
  <text x="500" y="335" text-anchor="middle" font-size="11" fill="#0b3d91" font-weight="bold">Electronics</text>
  <text x="500" y="349" text-anchor="middle" font-size="11" fill="#0b3d91" font-weight="bold">Enclosure</text>
  <text x="500" y="363" text-anchor="middle" font-size="9" fill="#0b3d91">90mm tall</text>

  <!-- Mast at bow: from deck level up to ~280mm above WL -->
  <rect x="190" y="80" width="10" height="310" fill="#999999" stroke="#666666" stroke-width="1.5"/>
  <text x="160" y="90" text-anchor="end" font-size="10" fill="#444">Mast (1" PVC)</text>

  <!-- Transducer at top of mast -->
  <rect x="178" y="64" width="34" height="20" fill="#f1c40f" stroke="#9a7d0a" stroke-width="1.5"/>
  <text x="195" y="50" text-anchor="middle" font-size="10" fill="#7d6608" font-weight="bold">TCT40-16R</text>
  <text x="195" y="62" text-anchor="middle" font-size="9" fill="#7d6608"></text>

  <!-- Thruster below waterline at stern -->
  <rect x="790" y="500" width="34" height="26" fill="#e74c3c" stroke="#922b21" stroke-width="1.5" transform="rotate(0)"/>
  <text x="845" y="517" font-size="10" fill="#922b21" font-weight="bold">Thruster</text>
  <text x="845" y="529" font-size="9" fill="#922b21">(below WL, stern)</text>

  <!-- Cable routing: enclosure -> down mast -> transducer (signal) -->
  <path d="M 470 320 C 350 280, 220 200, 195 90" fill="none" stroke="#27ae60" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- Cable routing: enclosure -> along deck -> down to stern thruster -->
  <path d="M 560 360 L 800 390 L 807 500" fill="none" stroke="#8e44ad" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="650" y="375" font-size="9" fill="#8e44ad">motor + control cable</text>
  <text x="330" y="230" font-size="9" fill="#27ae60">RX signal cable (coax)</text>

  <!-- Height labels / dimension lines on right side -->
  <line x1="870" y1="480" x2="870" y2="64" stroke="#333" stroke-width="1"/>
  <line x1="864" y1="480" x2="876" y2="480" stroke="#333" stroke-width="1"/>
  <line x1="864" y1="390" x2="876" y2="390" stroke="#333" stroke-width="1"/>
  <line x1="864" y1="291" x2="876" y2="291" stroke="#333" stroke-width="1"/>
  <line x1="864" y1="64" x2="876" y2="64" stroke="#333" stroke-width="1"/>

  <text x="700" y="484" font-size="11" fill="#000" font-weight="bold" text-anchor="end">WL = 0mm</text>
  <text x="700" y="394" font-size="11" fill="#000" font-weight="bold" text-anchor="end">Deck/enclosure bottom ≈ 87mm above WL</text>
  <text x="700" y="295" font-size="11" fill="#000" font-weight="bold" text-anchor="end">Enclosure top ≈ 177mm above WL</text>
  <text x="700" y="68" font-size="11" fill="#000" font-weight="bold" text-anchor="end">Mast top / transducer ≈ 250–300mm above WL</text>

  <!-- ground/baseline note -->
  <text x="480" y="660" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">Mast height: 250–300mm (25–30cm) above waterline per CLAUDE.md spec</text>
  <text x="480" y="678" text-anchor="middle" font-size="10" fill="#666">Enclosure and deck heights are estimates pending hull buoyancy bench test</text>

  <!-- Legend -->
  <g transform="translate(60,600)">
    <rect x="0" y="0" width="14" height="14" fill="#d9d9d9" stroke="#666"/>
    <text x="20" y="11" font-size="10" fill="#333">PVC</text>
    <rect x="70" y="0" width="14" height="14" fill="#aed6f1" stroke="#1f6feb"/>
    <text x="90" y="11" font-size="10" fill="#333">Enclosure</text>
    <rect x="190" y="0" width="14" height="14" fill="#e74c3c" stroke="#922b21"/>
    <text x="210" y="11" font-size="10" fill="#333">Thruster</text>
    <rect x="290" y="0" width="14" height="14" fill="#f1c40f" stroke="#9a7d0a"/>
    <text x="310" y="11" font-size="10" fill="#333">Transducer</text>
    <line x1="390" y1="7" x2="420" y2="7" stroke="#27ae60" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="425" y="11" font-size="10" fill="#333">Signal cable</text>
    <line x1="540" y1="7" x2="570" y2="7" stroke="#8e44ad" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="575" y="11" font-size="10" fill="#333">Power/control cable</text>
  </g>
</svg>
